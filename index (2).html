<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyMEDIC · P&amp;D Console (read-only)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F5F7;--panel:#FBFBFD;--card:#FFFFFF;
  --ink:#1D1D1F;--ink2:#2C2C2E;--text:#1D1D1F;--muted:#6E6E73;--faint:#86868B;
  --line:#E5E5E7;--line2:#D2D2D7;
  --teal:#0071E3;--teal-d:#0066CC;
  --indigo:#3D5A98;--amber:#C77D28;--green:#1E7A46;--blue:#2E6E9E;--red:#B23A34;--grey:#64748B;
  --exam:#3D5A98;--cpd:#0E9AA7;--skill:#C77D28;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 10px 30px rgba(0,0,0,.06);
  --radius:18px;
  --disp:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','Inter',sans-serif;
  --body:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue','Inter',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:#C7C7CC;border-radius:20px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}

.app{display:grid;grid-template-columns:232px 1fr;height:100vh;overflow:hidden}
.side{background:#FBFBFD;color:var(--muted);display:flex;flex-direction:column;padding:18px 14px;gap:4px;border-right:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0071E3,#4DA3F0);display:grid;place-items:center;color:#fff;font-family:var(--disp);font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(0,113,227,.3)}
.brand b{color:var(--ink);font-family:var(--disp);font-size:14.5px;letter-spacing:.2px;line-height:1.15;font-weight:600}
.brand span{display:block;color:var(--faint);font-size:10px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--muted);text-decoration:none;font-weight:500;font-size:12.5px;transition:background .15s,color .15s;position:relative}
.nav a .ic{width:17px;height:17px;flex:0 0 17px;opacity:.9}
.nav a:hover{background:#F0F0F2;color:var(--ink)}
.nav a.on{background:#ECECEE;color:var(--ink);font-weight:600}
.nav a.on::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--teal)}
.nav .cnt{margin-left:auto;font-family:var(--disp);font-size:11px;background:#ECECEE;color:var(--muted);padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}
.side-foot{margin-top:auto;padding:12px 8px 2px;border-top:1px solid var(--line);font-size:10.5px;color:var(--faint);line-height:1.55}
.side-foot b{color:var(--muted);font-weight:600}
.ro-pill{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(0,113,227,.1);color:var(--teal-d);border:1px solid rgba(0,113,227,.25);padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}

.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.top{display:flex;align-items:center;gap:14px;padding:14px 24px;background:rgba(245,245,247,.8);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line);z-index:5}
.top h1{margin:0;font-family:var(--disp);font-size:16px;font-weight:600;color:var(--ink)}
.top h1 small{display:block;font-family:var(--body);font-weight:500;font-size:11px;color:var(--muted);margin-top:1px}
.search{margin-left:auto;position:relative}
.search input{width:230px;padding:8px 12px 8px 32px;border:1px solid var(--line2);border-radius:9px;background:#fff;font-size:12.5px;color:var(--text);outline:none;transition:border .15s,box-shadow .15s}
.search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,113,227,.2)}
.search svg{position:absolute;left:10px;top:9px;width:15px;height:15px;stroke:var(--faint)}
.source{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:500;white-space:nowrap}
.source .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(0,113,227,.2)}
.btn{border:1px solid var(--line2);background:#fff;color:var(--ink);padding:8px 13px;border-radius:9px;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.btn:hover{border-color:var(--teal);color:var(--teal-d)}
.btn svg{width:15px;height:15px}

.scroll{flex:1;overflow:auto;padding:22px 24px 60px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== COST master–detail ===== */
.costwrap{display:grid;grid-template-columns:330px 1fr;gap:16px;align-items:start}
.costlist{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
.costlist .lh{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.costlist .lh .t{font-family:var(--disp);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.mini-search{position:relative}
.mini-search input{width:100%;padding:8px 11px 8px 30px;border:1px solid var(--line2);border-radius:8px;font-size:12px;outline:none}
.mini-search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,154,167,.12)}
.mini-search svg{position:absolute;left:9px;top:9px;width:14px;height:14px;stroke:var(--faint)}
.segfilter{display:flex;gap:5px;flex-wrap:wrap}
.segfilter button{border:1px solid var(--line2);background:#fff;color:var(--muted);padding:4px 9px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.segfilter button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.segfilter button i{width:7px;height:7px;border-radius:2px}
.clist{overflow:auto;flex:1}
.crow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px 15px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.crow:hover{background:#F0F7FA}
.crow.on{background:rgba(14,154,167,.1);box-shadow:inset 3px 0 0 var(--teal)}
.crow .cn{font-size:12px;font-weight:500;color:var(--text);line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.crow .cseg{font-size:10px;color:var(--faint);display:flex;align-items:center;gap:4px;margin-top:2px}
.crow .cseg i{width:7px;height:7px;border-radius:2px}
.crow .camt{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}

.detail{display:flex;flex-direction:column;gap:16px}
.dhead{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;position:relative;overflow:hidden}
.dhead::before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:var(--accent,var(--teal))}
.dhead h2{margin:0;font-family:var(--disp);font-size:20px;font-weight:600;color:var(--ink);line-height:1.2}
.dhead .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.badge i{width:8px;height:8px;border-radius:2px}
.dtotal{display:flex;align-items:baseline;gap:12px;margin-top:18px}
.dtotal .big{font-family:var(--disp);font-size:40px;font-weight:700;color:var(--ink);line-height:1}
.dtotal .cap{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.srcnote{margin-top:12px;font-size:11px;color:var(--faint);display:flex;align-items:center;gap:6px}
.srcnote svg{width:13px;height:13px;stroke:var(--faint);flex:0 0 13px}

.breakdown{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 22px}
.breakdown h3{margin:0 0 16px;font-family:var(--disp);font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.headgrid{display:grid;grid-template-columns:1fr;gap:12px}
.headrow{display:grid;grid-template-columns:150px 1fr 110px 52px;gap:14px;align-items:center}
.headrow .hl{font-size:12.5px;font-weight:500;color:var(--text)}
.headrow .ht{height:10px;background:#EDF2F8;border-radius:6px;overflow:hidden}
.headrow .hf{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.headrow .ha{font-family:var(--disp);font-size:13px;font-weight:600;text-align:right;color:var(--ink)}
.headrow .hp{font-family:var(--disp);font-size:11px;color:var(--faint);text-align:right}
.headfoot{display:grid;grid-template-columns:150px 1fr 110px 52px;gap:14px;margin-top:16px;padding-top:14px;border-top:2px solid var(--line2);align-items:center}
.headfoot .hl{font-family:var(--disp);font-weight:700;color:var(--ink);text-transform:uppercase;font-size:12px}
.headfoot .ha{font-family:var(--disp);font-size:16px;font-weight:700;text-align:right;color:var(--teal-d)}

.costcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cc{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:13px 15px;position:relative;overflow:hidden}
.cc::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--teal))}
.cc .l{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.cc .v{font-family:var(--disp);font-size:20px;font-weight:600;color:var(--ink);margin-top:5px}

/* ===== generic panels / dashboard (read-only) ===== */
.ribbon{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px}
.ribbon .rh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.ribbon .rh h2{margin:0;font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}
.ribbon .rh em{font-style:normal;font-family:var(--disp);font-size:12px;color:var(--faint)}
.pipe{display:flex;height:38px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
.pipe .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--disp);font-weight:600;font-size:12.5px;min-width:34px;transition:flex-grow .5s cubic-bezier(.4,0,.2,1);gap:6px;overflow:hidden;white-space:nowrap}
.pipe .seg span{font-family:var(--body);font-weight:500;font-size:10.5px;opacity:.9}
.pipelegend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px}
.pipelegend b{display:flex;align-items:center;gap:6px;font-weight:500;font-size:11px;color:var(--muted)}
.pipelegend i{width:9px;height:9px;border-radius:3px;display:inline-block}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--teal))}
.kpi .lab{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.kpi .val{font-family:var(--disp);font-size:30px;font-weight:600;color:var(--ink);line-height:1.1;margin-top:6px}
.kpi .sub{font-size:11px;color:var(--faint);margin-top:2px}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow)}
.panel h3{margin:0 0 14px;font-family:var(--disp);font-size:12.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.panel h3 em{font-style:normal;color:var(--faint);font-size:11px;font-family:var(--body);font-weight:500;text-transform:none;letter-spacing:0}
.bars{display:flex;flex-direction:column;gap:11px}
.bar{display:grid;grid-template-columns:130px 1fr 60px;align-items:center;gap:11px}
.bar .bl{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .bt{height:9px;background:#EDF2F8;border-radius:6px;overflow:hidden}
.bar .bf{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar .bn{font-family:var(--disp);font-size:12.5px;font-weight:600;text-align:right;color:var(--ink)}
.donutwrap{display:flex;align-items:center;gap:18px}
.dlegend{display:flex;flex-direction:column;gap:9px;flex:1}
.dlegend .dl{display:flex;align-items:center;gap:9px;font-size:12px}
.dlegend .dl i{width:10px;height:10px;border-radius:3px;flex:0 0 10px}
.dlegend .dl b{margin-left:auto;font-family:var(--disp);font-weight:600;color:var(--ink)}
.dlegend .dl span{color:var(--muted)}

/* ===== read-only tables ===== */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{border:1px solid var(--line2);background:#fff;color:var(--muted);padding:6px 12px;border-radius:20px;font-size:11.5px;font-weight:500;transition:all .15s}
.chip:hover{border-color:var(--teal)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.static{cursor:default}
.tcount{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:500}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.flt{display:inline-flex;flex-direction:column;gap:3px}
.flt>span{font-size:9.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--faint);padding-left:2px}
.flt select{appearance:none;-webkit-appearance:none;border:1px solid var(--line2);background:#fff;border-radius:8px;padding:7px 26px 7px 10px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text);outline:none;min-width:130px;max-width:200px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='9' height='9' viewBox='0 0 8 8'><path d='M1 2l3 3 3-3' stroke='%2394A6B8' stroke-width='1.4' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 9px center;transition:border .15s,box-shadow .15s}
.flt select:hover{border-color:var(--teal)}
.flt select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,154,167,.14)}
.fclear{align-self:flex-end;border:1px solid var(--line2);background:#fff;color:var(--teal-d);font-weight:600;font-size:11.5px;padding:7px 11px;border-radius:8px}
.fclear:hover{background:rgba(14,154,167,.1);border-color:var(--teal)}
.flt-block{width:100%}
.flt-block select{width:100%;min-width:0;max-width:none}
.tablecard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tscroll{overflow:auto;max-height:calc(100vh - 220px)}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:12px}
thead th{position:sticky;top:0;z-index:2;background:var(--ink);color:#DCE9F4;font-weight:600;text-align:left;padding:10px 12px;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--ink2)}
thead th:first-child{padding-left:16px}
thead th.rt{text-align:right}
tbody td{padding:8px 12px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--text);white-space:nowrap}
tbody td:first-child{padding-left:16px;color:var(--faint);font-family:var(--disp);font-size:11px}
tbody td.rt{text-align:right;font-family:var(--disp);font-weight:600}
tbody td.wrap{white-space:normal;min-width:180px;line-height:1.35}
tbody tr:nth-child(even){background:#FAFCFE}
tbody tr:hover{background:#F0F7FA}
tbody tr.hide{display:none}
tfoot td{padding:10px 12px;background:var(--panel);font-family:var(--disp);font-weight:700;color:var(--ink);border-top:2px solid var(--line2);position:sticky;bottom:0}
tfoot td:first-child{padding-left:16px}
tfoot td.rt{text-align:right}
.badge-sm{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.stagemeter{display:inline-flex;gap:2px;vertical-align:middle}
.stagemeter i{width:12px;height:8px;border-radius:2px;background:#E1E9F1}
.linkcell a{color:var(--teal-d);text-decoration:none;font-weight:500}
.linkcell a:hover{text-decoration:underline}
.hint{font-size:11px;color:var(--faint);margin:14px 2px 0;line-height:1.6}
.hint b{color:var(--muted)}
/* ===== course master cards ===== */
.cmsummary{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.cmsummary .pill{background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:500;color:var(--muted);display:inline-flex;gap:7px;align-items:center}
.cmsummary .pill b{font-family:var(--disp);font-weight:700;color:var(--ink)}
.cmgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.cmcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--sc);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px 0;display:flex;flex-direction:column;transition:box-shadow .15s,transform .15s}
.cmcard:hover{box-shadow:0 4px 10px rgba(0,0,0,.06),0 14px 34px rgba(0,0,0,.08)}
.cmcard.hide{display:none}
.cmc-top{display:flex;align-items:flex-start;gap:8px}
.cmc-eyebrow{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--sc);display:flex;align-items:center;gap:5px}
.cmc-eyebrow i{width:8px;height:8px;border-radius:2px;background:var(--sc)}
.cmc-status{margin-left:auto}
.cmc-title{font-family:var(--disp);font-size:15px;font-weight:600;color:var(--ink);margin:8px 0 13px;line-height:1.25}
.cmc-attrs{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;padding-bottom:13px}
.attr{display:flex;align-items:center;gap:8px;min-width:0}
.attr .ai{width:27px;height:27px;border-radius:7px;background:#EFF4F9;display:grid;place-items:center;flex:0 0 27px}
.attr .ai svg{width:15px;height:15px;stroke:#5A7189;fill:none}
.attr .av{font-size:12px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attr .av .k{display:block;font-size:9px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.3px;line-height:1.1}
.attr.pri .av{font-weight:700}
.cmc-stage{display:flex;align-items:center;gap:9px;margin:-2px 0 13px;padding:8px 11px;border-radius:9px;background:#F3F7FB;border:1px solid var(--line)}
.cmc-stage .si{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 28px}
.cmc-stage .si svg{width:16px;height:16px;stroke:#fff;fill:none}
.cmc-stage .sinfo{min-width:0;display:flex;flex-direction:column}
.cmc-stage .sinfo .k{font-size:9px;text-transform:uppercase;letter-spacing:.3px;color:var(--faint);font-weight:700;line-height:1.1}
.cmc-stage .sinfo b{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmc-stage .sinfo em{font-style:normal;font-size:10.5px;font-weight:700}
.cmc-stage .meter{margin-left:auto;display:flex;gap:2px;flex:0 0 auto}
.cmc-stage .meter i{width:9px;height:8px;border-radius:2px;background:#E1E9F1}
.cmc-foot{margin:0 -16px;background:#FAFCFE;border-top:1px solid var(--line);border-radius:0 0 11px 11px}

  if(pd<now){const m=monthsBetween(pd,now);return {state:'late',label:'Delayed'+(m>0?' · '+m+' mo behind':''),color:R,reason:c.delayReason};}

function barRow(l,n,tot,color){const p=tot?Math.round(n/tot*100):0;return `<div class="bar"><div class="bl" title="${esc(l)}">${esc(l)}</div><div class="bt"><div class="bf" data-w="${p}" style="width:0;background:${color}"></div></div><div class="bn">${fmt(n)}</div></div>`;}
function costBar(l,v,tot,color){const p=tot?Math.round(v/tot*100):0;return `<div class="bar"><div class="bl">${esc(l)}</div><div class="bt"><div class="bf" data-w="${p}" style="width:0;background:${color}"></div></div><div class="bn">${v?fmt(Math.round(v/1000))+'k':'—'}</div></div>`;}
function costHeadBars(){const sums=HEADS.map(([k,l])=>[l,DATA.courses.reduce((a,c)=>a+(+((c.cost||{})[k])||0),0)]);const max=Math.max(1,...sums.map(x=>x[1]));
  return sums.map(([l,v])=>`<div class="bar"><div class="bl">${l}</div><div class="bt"><div class="bf" data-w="${Math.round(v/max*100)}" style="width:0;background:var(--cpd)"></div></div><div class="bn">${v?fmt(Math.round(v/1000))+'k':'—'}</div></div>`).join('');}
function ring(p){const r=36,c=2*Math.PI*r,off=c*(1-p);return `<circle cx="43" cy="43" r="${r}" fill="none" stroke="#E7EEF5" stroke-width="9"/><circle cx="43" cy="43" r="${r}" fill="none" stroke="var(--teal)" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 43 43)" style="transition:stroke-dashoffset .8s ease"/><text x="43" y="48" text-anchor="middle" font-family="var(--disp)" font-size="17" font-weight="700" fill="var(--ink)">${Math.round(p*100)}%</text>`;}
function donutSVG(data){const total=data.reduce((a,d)=>a+d.value,0)||1;let ang=-90;const R=54,r=32,cx=64,cy=64;let paths='';
  data.forEach(d=>{if(d.value<=0)return;const a0=ang,a1=ang+d.value/total*360;ang=a1;paths+=`<path d="${arc(cx,cy,R,r,a0,a1)}" fill="${d.color}"/>`;});
  const svg=`<svg width="128" height="128" viewBox="0 0 128 128">${paths||`<circle cx="64" cy="64" r="43" fill="none" stroke="#E7EEF5" stroke-width="22"/>`}<text x="64" y="60" text-anchor="middle" font-family="var(--disp)" font-weight="700" font-size="22" fill="var(--ink)">${total}</text><text x="64" y="76" text-anchor="middle" font-size="9.5" fill="var(--muted)">courses</text></svg>`;
  return {svg,legend:data.map(d=>`<div class="dl"><i style="background:${d.color}"></i><span>${d.label}</span><b>${d.value}</b></div>`).join('')};}
function arc(cx,cy,R,r,a0,a1){const p=(a,rad)=>[cx+rad*Math.cos(a*Math.PI/180),cy+rad*Math.sin(a*Math.PI/180)];const large=(a1-a0)>180?1:0;const[x0,y0]=p(a0,R),[x1,y1]=p(a1,R),[x2,y2]=p(a1,r),[x3,y3]=p(a0,r);return `M${x0} ${y0}A${R} ${R} 0 ${large} 1 ${x1} ${y1}L${x2} ${y2}A${r} ${r} 0 ${large} 0 ${x3} ${y3}Z`;}

/* ===== read-only tables ===== */
function tableCard(cols,bodyHTML,footHTML){
  return `<div class="tablecard"><div class="tscroll"><table><thead><tr>${cols.map(c=>`<th class="${c.rt?'rt':''}" style="${c.w?`min-width:${c.w}px`:''}">${c.h}</th>`).join('')}</tr></thead><tbody id="tbody">${bodyHTML}</tbody>${footHTML?`<tfoot>${footHTML}</tfoot>`:''}</table></div></div>`;
}
// build a data-attr string from {field:value}
function dattrs(o){return Object.entries(o).map(([k,v])=>`data-${k}="${esc(v)}"`).join(' ');}

function renderCourses(){
  const defs=[
    fsel('courses','course','Course',uniq(DATA.courses,c=>c.name),FS.courses.course),
    fsel('courses','segment','Segment',Object.keys(SEGC),FS.courses.segment),
    fsel('courses','status','Status',uniq(DATA.courses,c=>c.status),FS.courses.status),
    fsel('courses','audience','Audience',uniq(DATA.courses,c=>c.audience),FS.courses.audience),
    fsel('courses','priority','Priority',uniq(DATA.courses,c=>c.priority),FS.courses.priority),
  ];
  const summary=`<div class="cmsummary"><span class="pill">Courses shown <b id="cmcount">${DATA.courses.length}</b></span><span class="pill">Total cost <b id="cmtotal">—</b></span></div>`;
  const cards=DATA.courses.map(c=>{
    const sc=SEGC[c.segment]||'#647688';const tot=courseTotal(c);
    const pcol=PRIC[c.priority]||'#647688';
    const ps=prodStage(c);const psc=prodColor(ps);const di=delayInfo(c);
    return `<div class="cmcard" style="--sc:${sc}" data-course="${esc(c.name)}" data-segment="${esc(c.segment)}" data-status="${esc(c.status)}" data-audience="${esc(c.audience)}" data-priority="${esc(c.priority)}" data-cost="${tot}" data-txt="${esc((c.name+' '+c.segment+' '+c.status+' '+c.coordinator+' '+c.director+' '+c.proposedBy).toLowerCase())}">
      <div class="cmc-top"><span class="cmc-eyebrow"><i></i>${esc(c.segment)||'—'}</span><span class="cmc-status">${badge(c.status,STATC[c.status]||'#94A6B8')}</span></div>
      <div class="cmc-title">${esc(c.name)}</div>
      <div class="cmc-stage">
        <span class="si" style="background:${psc}"><svg viewBox="0 0 24 24" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="${STAGE_ICONS[ps.i]}"/></svg></span>
        <span class="sinfo"><span class="k">Production stage</span><b>${esc(ps.name)}</b><em style="color:${psc}">${esc(ps.status)}</em></span>
        ${stageMeter(c)}
      </div>
      <div class="cmc-attrs">
        ${cmAttr('audience','Audience',c.audience)}
        ${cmAttr('type','Type',c.type)}
        ${cmAttr('mode','Mode',c.mode)}
        ${cmAttr('coordinator','Coordinator',c.coordinator,'',null,true)}
        ${cmAttr('director','Director / Prog. Coord.',c.director,'',null,true)}
        ${cmAttr('proposer','Proposed by',c.proposedBy,'',null,true)}
        ${cmAttr('calendar','Completion (FY · Qtr · Month)',((c.fy||'')+(c.quarter?' · '+c.quarter:'')+(c.completionMonth?' · '+c.completionMonth:''))||'—')}
        ${cmAttr('priority','Priority',c.priority,'pri',pcol)}
      </div>
      <div class="cmc-foot">
        <div class="cmc-delay">
          <span class="dchip" style="background:${hexA(di.color,.14)};color:${di.color}"><svg viewBox="0 0 24 24" fill="none" stroke="${di.color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="${DELAY_ICON[di.state]||DELAY_ICON.none}"/></svg>${esc(di.label)}</span>
          ${di.reason?`<span class="dreason">${esc(di.reason)}</span>`:(di.state==='late'?`<span class="dreason">Reason not recorded</span>`:'')}
        </div>
        <div class="cmc-cost"><span>Development cost</span><b>${tot?inr(tot):'—'}</b></div>
        <div class="cmc-split">${HEAD_SHORT.map(([k,l])=>`<span class="hc">${l}<b>${fmt((c.cost||{})[k]||0)}</b></span>`).join('')}</div>

function renderStages(){
  const defs=[
    fsel('stages','course','Course',uniq(DATA.courses,c=>c.name),FS.stages.course),
    fsel('stages','segment','Segment',Object.keys(SEGC),FS.stages.segment),
    fsel('stages','status','Course status',uniq(DATA.courses,c=>c.status),FS.stages.status),
  ];
  const legend=`<div class="stagelegend">
    <b><i style="background:#1E7A46"></i>Fully approved</b>
    <b><i style="background:#0E9AA7"></i>Completed, approval pending</b>
    <b><i style="background:#2E6E9E"></i>In progress</b>
    <b><i style="background:#64748B"></i>On hold</b>
    <b><i style="background:#C9D6E5"></i>Not started</b></div>
    <div class="approvers-note">Sign-off roles — <b>COO</b> Dr. Sowmya · <b>VP</b> Sreeraj · <b>Manager</b> Athul · <b>PC</b> per-course program coordinator. First two stages need Manager, VP &amp; COO; Curriculum Development onward also needs PC.</div>`;
  const cards=DATA.courses.map(c=>{
    const p=Math.round(stagePct(c)*100);
    const approved=(c.stages||[]).filter((s,i)=>stageApproved(s,i)).length;
    const sc=SEGC[c.segment]||'#647688';
    const nodes=(c.stages||[]).map((st,i)=>{
      const state=stageState(st,i);const col=STATE_COL[state];
      const filled=state!=='todo';
      const iconColor=filled?'#fff':'#94A6B8';
      const bg=filled?col:'#EEF3F9';
      // connector into this node reflects the PREVIOUS stage completion
      let conn='';
      if(i>0){const prev=stageState(c.stages[i-1],i-1);const pcol=(prev==='done')?'#1E7A46':(prev==='review'?'#0E9AA7':'#E1E9F1');conn=`<div class="sconn" style="background:${pcol}"></div>`;}
      const tick=state==='done'?`<div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></div>`:'';
      const apPills=stageApprovers(i).map(role=>{const info=apInfo((st.approvals||{})[role]||'Pending');const meta=APPROVERS[role]||{label:role};return `<span class="ap" style="background:${hexA(info.c,.13)};color:${info.c}" title="${esc(meta.label)}${meta.name?' · '+esc(meta.name):''}">${esc(meta.label)} ${info.t}</span>`;}).join('');
      return `<div class="snode">${conn}
        <div class="sicon" style="background:${bg}">
          <svg viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="${STAGE_ICONS[i]}"/></svg>${tick}
        </div>
        <div class="slabel"><span class="snum">${i+1}.</span> ${esc(STAGE_NAMES[i])}</div>
        <div class="sstatus" style="color:${state==='todo'?'#94A6B8':col}">${esc(st.status)}</div>
        <div class="appr">${apPills}</div></div>`;
    }).join('');
    return `<div class="scard" data-course="${esc(c.name)}" data-segment="${esc(c.segment)}" data-status="${esc(c.status)}" data-txt="${esc(c.name.toLowerCase())}">
      <div class="scard-head">
        <h3>${esc(c.name)}</h3>
        <span class="segtag" style="background:${hexA(sc,.13)};color:${sc}"><i style="background:${sc}"></i>${esc(c.segment)||'—'}</span>
        <span class="segtag" style="background:${hexA(STATC[c.status]||'#94A6B8',.13)};color:${STATC[c.status]||'#94A6B8'}">${esc(c.status)||'—'}</span>
        <div class="ov"><div class="ovbar"><i style="width:${p}%;background:${p===100?'#1E7A46':'#2E6E9E'}"></i></div><span class="ovn">${p}%</span><span class="ovc">${approved}/${(c.stages||[]).length} approved</span></div>
      </div>
      <div class="flow">${nodes}</div>
    </div>`;
  }).join('');
  document.getElementById('view').innerHTML=filterbar('stages',defs)+legend+`<div class="stagecards" id="stagecards">${cards}</div>`;
  wireFilters('stages',renderStages);applyFilters();
}

/* ===== unified filter + search engine ===== */
function applyFilters(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const f=FS[VIEW]||{};
  const rows=document.querySelectorAll('#view [data-txt]');let vis=0;
  const sums={};
  rows.forEach(tr=>{
    if(!tr.dataset.txt)return;
    let show=!q||tr.dataset.txt.includes(q);
    if(show){for(const k in f){if(f[k]&&tr.dataset[k]!==f[k]){show=false;break;}}}
    tr.classList.toggle('hide',!show);
    if(show){vis++;
      let cv=null;
      if(tr.dataset&&tr.dataset.cost!=null&&tr.dataset.cost!=='')cv=+tr.dataset.cost;
      else{const cc=tr.querySelector&&tr.querySelector('[data-cost]');if(cc)cv=+cc.dataset.cost;}
      if(cv!=null)sums.cost=(sums.cost||0)+cv;
    }
  });
  const tc=document.getElementById('tcount');if(tc)tc.textContent=vis+' shown';
  updateFooters(sums);
}
function updateFooters(sums){
  const cf=document.getElementById('costfoot');if(cf)cf.textContent=fmt(sums.cost||0);
  const cmt=document.getElementById('cmtotal');if(cmt)cmt.textContent=inr(sums.cost||0);
  const cmc=document.getElementById('cmcount');if(cmc){const tc=document.getElementById('tcount');cmc.textContent=(tc?parseInt(tc.textContent)||0:0);}
  const tmc=document.getElementById('teamcount');if(tmc){const tc=document.getElementById('tcount');tmc.textContent=(tc?parseInt(tc.textContent)||0:0);}
  const cnc=document.getElementById('contentcount');if(cnc){const tc=document.getElementById('tcount');cnc.textContent=(tc?parseInt(tc.textContent)||0:0);}
  const acn=document.getElementById('acccount');if(acn){const tc=document.getElementById('tcount');acn.textContent=(tc?parseInt(tc.textContent)||0:0);}
  const tkc=document.getElementById('taskcount');if(tkc){const tc=document.getElementById('tcount');tkc.textContent=(tc?parseInt(tc.textContent)||0:0);}
  if(VIEW==='pay'){let a=0,p=0;document.querySelectorAll('#tbody tr:not(.hide)').forEach(tr=>{const t=tr.querySelectorAll('td.rt');if(t.length>=3){a+=num(t[0].textContent);p+=num(t[1].textContent);}});
    setTxt('fAgreed',fmt(a));setTxt('fPaid',fmt(p));setTxt('fBal',fmt(a-p));}
  if(VIEW==='content'){let pl=0,dn=0;document.querySelectorAll('#tbody tr:not(.hide)').forEach(tr=>{const t=tr.querySelectorAll('td.rt');if(t.length>=2){pl+=num(t[0].textContent);dn+=num(t[1].textContent);}});
    setTxt('cPlanned',pl?fmt(pl):'\u2014');setTxt('cDone',fmt(dn));setTxt('cRem',pl?fmt(pl-dn):'\u2014');setTxt('cPct',pl?Math.round(dn/pl*100)+'%':'\u2014');}
}
const num=s=>+String(s).replace(/[^\d.-]/g,'')||0;
const setTxt=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};

document.getElementById('search').addEventListener('input',()=>{
  if(VIEW==='cost'){mini=document.getElementById('search').value;const el=document.getElementById('minisearch');if(el)el.value=mini;fillCostList();}
  else if(VIEW!=='dash'){applyFilters();}
});

const AV_COLORS=['#3D5A98','#0E9AA7','#C77D28','#1E7A46','#2E6E9E','#7A5AA6','#B23A6E','#4A7C59'];
function initials(n){const p=String(n||'').replace(/\b(dr|mr|mrs|ms|prof)\.?\b/gi,'').trim().split(/[\s.\-]+/).filter(Boolean);return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase();}
function avColor(n){let h=0;for(const ch of String(n))h=(h*31+ch.charCodeAt(0))>>>0;return AV_COLORS[h%AV_COLORS.length];}
function avatarHTML(p){if(p&&p.photo)return `<div class="pd-avatar"><img src="${esc(p.photo)}" alt="${esc(p.name)}" onerror="this.parentNode.textContent='${esc(initials(p.name))}'"></div>`;return `<div class="pd-avatar" style="background:${avColor(p.name)}">${esc(initials(p.name))}</div>`;}
function involvedIn(name){
  const list=[];
  DATA.courses.forEach(c=>{if((c.proposedBy||'').trim()===name)list.push({course:c.name,seg:c.segment,role:'Proposed by'});});
  (DATA.mentors||[]).forEach(m=>{if((m.name||'').trim()===name)list.push({course:m.course,seg:(DATA.courses.find(c=>c.name===m.course)||{}).segment,role:m.role||'Team'});});
  return list;
}

  const mailRow=(icon,k,val,href)=> `<div class="pd-row"><span class="ri"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${icon}"/></svg></span><div class="rc"><div class="k">${k}</div>${val?`<div class="v">${href?`<a href="${href}">${esc(val)}</a>`:esc(val)}</div>`:`<div class="v empty">Not on file</div>`}</div></div>`;
  const ICON={mail:'M3 6h18v12H3zM3 7l9 6 9-6',phone:'M4 4h4l2 5-3 2a12 12 0 006 6l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 011-2z',doc:'M7 3h7l5 5v13H7zM14 3v5h5M9 13h6M9 17h6'};
  const resume=p.resume?`<div class="pd-row"><span class="ri"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${ICON.doc}"/></svg></span><div class="rc"><div class="k">R\u00e9sum\u00e9</div><a class="pd-resume" href="${esc(p.resume)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3v12M8 11l4 4 4-4M4 21h16"/></svg>Open r\u00e9sum\u00e9</a></div></div>`
    :`<div class="pd-row"><span class="ri"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${ICON.doc}"/></svg></span><div class="rc"><div class="k">R\u00e9sum\u00e9</div><div class="v empty">Not uploaded</div></div></div>`;
  const invHTML=inv.length?`<div class="pd-section"><h4>Involved in (${inv.length})</h4>${inv.slice(0,40).map(x=>`<div class="pd-course"><i style="background:${SEGC[x.seg]||'#94A6B8'}"></i><span class="cn">${esc(x.course)||'\u2014'}</span><b>${esc(x.role)}</b></div>`).join('')}</div>`:'';
  document.getElementById('pcontent').innerHTML=`
    <div class="pd-head">
      <button class="pd-close" id="pdclose" aria-label="Close">&times;</button>
      ${avatarHTML(p)}
      <div class="pd-name">${esc(p.name)}</div>
      ${p.specialty?`<div class="pd-sub">${esc(p.specialty)}${p.dept?' \u00b7 '+esc(p.dept):''}</div>`:(p.dept?`<div class="pd-sub">${esc(p.dept)}</div>`:'')}
      ${roles.length?`<div class="pd-roles">${roles.map(r=>`<span class="pd-role">${esc(r)}</span>`).join('')}</div>`:''}
    </div>
    <div class="pd-body">
      ${mailRow(ICON.mail,'Email',p.email,p.email?'mailto:'+encodeURIComponent(p.email):'')}
      ${mailRow(ICON.phone,'Contact number',p.phone,p.phone?'tel:'+String(p.phone).replace(/[^+\d]/g,''):'')}
      ${resume}
      ${invHTML}
      ${p.note?`<div class="pd-note">${esc(p.note)}</div>`:''}
    </div>`;
  document.getElementById('pdrawer').classList.add('on');
  document.getElementById('pscrim').classList.add('on');
  document.getElementById('pdrawer').setAttribute('aria-hidden','false');
  const cl=document.getElementById('pdclose');if(cl)cl.onclick=closeProfile;
}
function closeProfile(){document.getElementById('pdrawer').classList.remove('on');document.getElementById('pscrim').classList.remove('on');document.getElementById('pdrawer').setAttribute('aria-hidden','true');}
document.getElementById('pscrim').addEventListener('click',closeProfile);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeProfile();});
document.getElementById('view').addEventListener('click',e=>{const t=e.target.closest&&e.target.closest('.plink');if(t){e.preventDefault();openProfile(t.dataset.person);}});

/* ===== planning helpers ===== */
const PLAN_ROLE_COL={'COO':'#B23A34','VP':'#3D5A98','Manager':'#C77D28','Planning Team Lead':'#7A5AA6','Planning Coordinator':'#0E9AA7','Program Coordinator':'#0E9AA7'};
function avatarMini(name){const p=PEOPLE[(name||'').trim()];if(p&&p.photo)return `<div class="pt-av"><img src="${esc(p.photo)}" alt=""></div>`;return `<div class="pt-av" style="background:${avColor(name)}">${esc(initials(name))}</div>`;}


function renderPlanning(){
  const team=DATA.planningTeam||[];
  const defs=[ fsel('planning','role','Role',uniq(team,m=>m.role),FS.planning.role) ];
  const cards=team.map(m=>{
    const nm=(m.name||'').trim();
    const mgmt=['COO','VP','Manager'].includes(m.role);
    const assigned=DATA.courses.filter(c=>(c.coordinator||'').trim()===nm);
    const count=mgmt?DATA.courses.length:assigned.length;
    const rc=PLAN_ROLE_COL[m.role]||'#647688';
    const p=PEOPLE[nm]||{};
    const chips=mgmt
      ? `<span class="pt-note">Approves &amp; oversees all ${DATA.courses.length} courses in the pipeline.</span>`
      : (assigned.length?assigned.map(c=>`<span class="pt-chip" style="--sc:${SEGC[c.segment]||'#647688'}"><i></i>${esc(c.name)}</span>`).join(''):'<span class="pt-empty">No courses assigned yet.</span>');
    return `<div class="ptcard" data-role="${esc(m.role)}" data-txt="${esc((nm+' '+m.role+' '+(m.responsibilities||'')).toLowerCase())}">
      <div class="pt-head">${avatarMini(nm)}<div class="pt-id"><div class="pt-name">${personSpan(nm)}</div><span class="pt-role" style="background:${hexA(rc,.14)};color:${rc}">${esc(m.role)}</span></div><div class="pt-stat"><b>${count}</b><span>${mgmt?'courses (oversight)':'courses assigned'}</span></div></div>
      <div class="pt-block"><span class="k">Responsibilities</span><p>${esc(m.responsibilities)||'—'}</p></div>
      <div class="pt-block"><span class="k">Assigned courses${mgmt?'':` (${assigned.length})`}</span><div class="pt-chips">${chips}</div></div>
      <div class="pt-foot">${p.email?`<a href="mailto:${esc(p.email)}">${esc(p.email)}</a>`:'<span></span>'}<span class="pt-link plink" data-person="${esc(nm)}">View profile &rarr;</span></div>
    </div>`;
  }).join('');
  const summary=`<div class="cmsummary"><span class="pill">Team members <b>${team.length}</b></span><span class="pill">Coordinators <b>${team.filter(m=>/Coordinator/.test(m.role)).length}</b></span></div>`;
  document.getElementById('view').innerHTML=filterbar('planning',defs)+summary+`<div class="ptgrid">${cards}</div>`;
  wireFilters('planning',renderPlanning);applyFilters();
}

/* ===== task assignment ===== */
const TASK_STAT_COL={'Assigned':'#2E6E9E','In Progress':'#C77D28','Done':'#1E7A46','Blocked':'#B23A34'};
function taskMailto(t){
  const p=PEOPLE[(t.assignee||'').trim()]||{};const email=p.email||'';
  const subj=encodeURIComponent('Task assigned: '+(t.title||''));
  const body=encodeURIComponent('Hi '+(t.assignee||'')+',\n\nA task has been assigned to you in the StudyMEDIC P&D console:\n\n'
    +'Task: '+(t.title||'')+'\nCourse: '+(t.course||'—')+'\nPriority: '+(t.priority||'—')+'\nDue: '+(t.due||'—')+'\n\nPlease log in to the console and confirm receipt.\n\n— StudyMEDIC Planning & Development');
  return email?('mailto:'+email+'?subject='+subj+'&body='+body):'';
}
function renderTasks(){
  const tasks=DATA.tasks||[];
  const statOpts=(DATA.taskStatuses&&DATA.taskStatuses.length)?DATA.taskStatuses:['Assigned','In Progress','Done','Blocked'];
  const defs=[
    fsel('tasks','assignee','Assignee',uniq(tasks,t=>t.assignee),FS.tasks.assignee),
    fsel('tasks','status','Status',statOpts,FS.tasks.status),
    fsel('tasks','priority','Priority',uniq(tasks,t=>t.priority),FS.tasks.priority),
  ];
  const cols=[{h:'Task ID',w:80},{h:'Task',w:250},{h:'Assignee',w:150},{h:'Course',w:180},{h:'Priority',w:100},{h:'Due',w:110},{h:'Status',w:120},{h:'Notify',w:150}];
  const rows=tasks.map(t=>{
    const pc=PRIC[t.priority]||'#647688';const sc=TASK_STAT_COL[t.status]||'#94A6B8';const href=taskMailto(t);
    return `<tr data-assignee="${esc(t.assignee)}" data-status="${esc(t.status)}" data-priority="${esc(t.priority)}" data-txt="${esc(((t.title||'')+' '+(t.assignee||'')+' '+(t.course||'')).toLowerCase())}">
      <td><b style="font-family:var(--disp);font-size:11px;color:var(--muted)">${esc(t.id)}</b></td>
      <td class="wrap"><b style="font-weight:600">${esc(t.title)||'—'}</b>${t.notes?`<div style="font-size:11px;color:var(--faint);margin-top:2px">${esc(t.notes)}</div>`:''}</td>
      <td>${t.assignee?personSpan(t.assignee):'—'}</td>
      <td class="wrap">${esc(t.course)||'—'}</td>
      <td><b style="color:${pc};font-weight:700">${esc(t.priority)||'—'}</b></td>
      <td>${esc(t.due)||'—'}</td>
      <td>${t.status?badge(t.status,sc):'—'}</td>
      <td class="linkcell">${href?`<a class="tasknotify" href="${href}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18v12H3zM3 7l9 6 9-6"/></svg>Email confirmation</a>`:'<span style="color:var(--faint)">No email on file</span>'}</td></tr>`;
  }).join('');
  const summary=`<div class="cmsummary"><span class="pill">Tasks shown <b id="taskcount">${tasks.length}</b></span></div>`;
  const note=`<div class="approvers-note">This console is read-only. The <b>Email confirmation</b> button opens a pre-filled message in your own mail app to send to the assignee — the page itself cannot send mail or sign people in. Automatic email + login require a server backend.</div>`;
  document.getElementById('view').innerHTML=filterbar('tasks',defs)+note+summary+tableCard(cols,rows);
  wireFilters('tasks',renderTasks);applyFilters();
}

/* ===== router ===== */
function render(){seg=(VIEW==='courses'||VIEW==='acc')?seg:seg;({cost:renderCost,dash:renderDash,courses:renderCourses,stages:renderStages,mentors:renderMentors,pay:renderPay,content:renderContent,acc:renderAcc,planning:renderPlanning,tasks:renderTasks}[VIEW])();}

/* ===== init ===== */
(function(){
  if(DATA.updated){document.getElementById('sourcetxt').textContent=(usingBackend?'Backend: pd_data.js · ':'Embedded data · ')+DATA.updated;}
  else document.getElementById('sourcetxt').textContent=usingBackend?'Backend: pd_data.js':'Embedded data';
  // reset seg between views that use it differently
  buildNav();go('dash');
})();

</script>
